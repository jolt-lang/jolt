name: release

# Build the self-contained joltc binary for each platform and attach it to the
# GitHub Release when a v* tag is pushed. The binary bundles the runtime,
# compiler, jolt-core + stdlib source, the Chez boots, and a launcher stub, so it
# runs AND compiles jolt apps with no Chez or cc on the user's machine (jolt-eaj).
#
# No Apple notarization, mirroring dirge: macOS users who download the tarball
# clear Gatekeeper quarantine once (`xattr -d com.apple.quarantine joltc`), or
# install via a Homebrew tap that de-quarantines on install.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}   # dry-run the build matrix without tagging

permissions:
  contents: write   # create/update the GitHub Release and upload assets

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # The Linux binary is built inside a manylinux2014 container (glibc
          # 2.17, gcc 10) with ncurses/tinfo/zlib linked statically, so the
          # prebuilt runs on any glibc distro since ~2014 (CentOS 7+, Ubuntu
          # 14.04+, Debian 8+, Amazon Linux 2+) — every >=2.33 symbol the old
          # runner-built binary demanded was a build-host artifact, not a real
          # API need (#452). Remaining dynamic deps: liblz4/libuuid + glibc.
          - os: ubuntu-latest
            target: x86_64-linux
            shell: bash
            container-build: quay.io/pypa/manylinux2014_x86_64
          - os: macos-14
            target: aarch64-macos
            shell: bash
          # x86_64-macos is cross-built from the arm64 macos-14 runner (GitHub
          # retired the Intel runners): `cross: ta6osx` gates the extra Chez-cross
          # + pack steps below, and the binary is smoke-tested via Rosetta 2.
          - os: macos-14
            target: x86_64-macos
            shell: bash
            cross: ta6osx
          - os: windows-latest
            target: x86_64-windows
            shell: msys2 {0}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive   # vendor/irregex, used by the Chez regex shim

      # --- Linux: the whole Chez + joltc build runs inside the old-glibc
      # container (matrix.container-build) via ci/glibc-floor-build.sh — the
      # same script the glibc-floor probe validated. docker run, not
      # `container:`, because node-based actions can't run on a glibc-2.17
      # image. The container writes target/release/joltc into the mounted
      # workspace; every later step (smokes, package) runs on the host. ---
      - name: Clone Chez Scheme source (Linux)
        if: runner.os == 'Linux'
        run: |
          git clone --depth 1 --branch v10.4.1 --recurse-submodules \
            https://github.com/cisco/ChezScheme.git "$HOME/chez-src"

      - name: Cache Chez Scheme (Linux)
        if: runner.os == 'Linux'
        id: cache-chez
        uses: actions/cache@v4
        with:
          path: ~/chez-opt
          key: chez-manylinux2014-v10.4.1-static-v1

      - name: Build joltc in ${{ matrix.container-build }} (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p "$HOME/chez-opt"
          docker run --rm \
            -v "$PWD":/src \
            -v "$HOME/chez-src":/chez-src:ro \
            -v "$HOME/chez-opt":/opt/chez \
            -w /src \
            -e JOLT_VERSION="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}" \
            -e STATIC_DEPS=1 \
            '${{ matrix.container-build }}' sh ci/glibc-floor-build.sh

      # --- macOS: Homebrew chezscheme ships `chez` plus the csv kernel dev files
      # (libkernel.a, scheme.h, *.boot), which is all build-joltc needs. ---
      - name: Install Chez Scheme (macOS)
        if: runner.os == 'macOS'
        run: brew install chezscheme lz4

      # --- Windows: MSYS2/MinGW-w64 toolchain + Chez built from source (ta6nt).
      # The whole job runs in the msys2 shell so cc/xxd/paths behave; the
      # produced joltc.exe is a plain Windows binary (no MSYS runtime dep). ---
      - name: Set up MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          # inherit the runner PATH so GITHUB_PATH additions (the chez wrapper
          # dir) are visible inside the msys2 shell
          path-type: inherit
          install: >-
            git make vim unzip zip
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-lz4
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-ntldd

      - name: Cache Chez Scheme (Windows)
        if: runner.os == 'Windows'
        id: cache-chez-win
        uses: actions/cache@v4
        with:
          path: chez-install
          key: chez-${{ matrix.os }}-v10.4.1-mingw64

      - name: Build Chez Scheme from source (Windows)
        if: runner.os == 'Windows' && steps.cache-chez-win.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v10.4.1 https://github.com/cisco/ChezScheme.git /tmp/chez-src
          cd /tmp/chez-src
          ./configure --threads
          make -j"$(nproc)"
          # `make install` drives the unix installsh through cmd and dies; the
          # build tree has everything — assemble the layout by hand. Boot files
          # sit next to scheme.exe (that's where the Windows kernel looks).
          inst="$GITHUB_WORKSPACE/chez-install"
          mkdir -p "$inst/bin" "$inst/csv"
          cp ta6nt/bin/ta6nt/*.exe "$inst/bin/"
          cp ta6nt/bin/ta6nt/*.dll "$inst/bin/" 2>/dev/null || true
          cp ta6nt/boot/ta6nt/petite.boot ta6nt/boot/ta6nt/scheme.boot "$inst/bin/"
          cp ta6nt/boot/ta6nt/petite.boot ta6nt/boot/ta6nt/scheme.boot "$inst/csv/"
          cp ta6nt/boot/ta6nt/scheme.h "$inst/csv/"
          cp ta6nt/boot/ta6nt/equates.h "$inst/csv/" 2>/dev/null || true
          cp ta6nt/boot/ta6nt/libkernel.a "$inst/csv/" || { echo "libkernel.a not found:"; find ta6nt -name "*.a" -o -name "kernel*"; exit 1; }

      - name: Put chez on PATH (Windows)
        if: runner.os == 'Windows'
        run: |
          bindir="$GITHUB_WORKSPACE/chez-install/bin"
          { echo '#!/bin/sh'; echo "exec \"$bindir/scheme.exe\" \"\$@\""; } > "$bindir/chez"
          chmod +x "$bindir/chez"
          echo "$bindir" >> "$GITHUB_PATH"
          echo "JOLT_CHEZ_CSV=$GITHUB_WORKSPACE/chez-install/csv" >> "$GITHUB_ENV"
          # cc is the build's compiler name; alias it to mingw gcc
          { echo '#!/bin/sh'; echo 'exec gcc "$@"'; } > "$bindir/cc"
          chmod +x "$bindir/cc"

      - name: Show Chez version
        if: runner.os != 'Linux'
        run: chez --version

      # --- x86_64-macos is cross-built on the arm64 runner (matrix.cross=ta6osx):
      # build the target boots/xpatch + cross kernel, then assemble a target pack
      # that `jolt build --target` / build-joltc.ss consume. ---
      - name: Cache Chez cross (ta6osx)
        if: matrix.cross
        id: cache-chez-cross
        uses: actions/cache@v4
        with:
          path: ~/chez-cross
          key: chez-cross-v10.4.1-tarm64osx-${{ matrix.cross }}-v1

      - name: Build ${{ matrix.cross }} boots/xpatch + cross kernel
        if: matrix.cross && steps.cache-chez-cross.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v10.4.1 --recurse-submodules \
            https://github.com/cisco/ChezScheme ~/chez-cross
          cd ~/chez-cross
          ./configure -m=tarm64osx && make -j"$(sysctl -n hw.ncpu)"
          make bootquick XM=${{ matrix.cross }}
          # minos: pin -mmacosx-version-min in the kernel AND the final link, or
          # the binary won't load on Macs older than the runner's OS.
          ./configure --cross --force -m=${{ matrix.cross }} \
            CFLAGS="-arch x86_64 -mmacosx-version-min=11.0" CC_FOR_BUILD=cc
          make -j"$(sysctl -n hw.ncpu)"

      - name: Assemble target pack + set cross env
        if: matrix.cross
        run: |
          CHEZ_SRC=~/chez-cross tools/cross-compile/make-pack.sh ${{ matrix.cross }} "$HOME/pack"
          echo "JOLT_TARGET_PACK=$HOME/pack" >> "$GITHUB_ENV"
          echo "JOLT_TARGET_ARCH_FLAG=-arch x86_64 -mmacosx-version-min=11.0" >> "$GITHUB_ENV"
          # every smoke below runs the produced x86_64 binary via Rosetta 2.
          echo "JOLT_RUN_PREFIX=arch -x86_64" >> "$GITHUB_ENV"

      # build-joltc compiles in a fresh Chez and cc-links; the checked-in seed is
      # the compiler image, so no selfhost re-mint (that byte-fixpoint is a
      # dev-machine check — see jolt-8479). `make joltc-release`, not `make joltc`.
      # JOLTC_TARGET is empty for native rows and the target machine for the cross
      # row (matrix.cross), which build-joltc.ss consumes with $JOLT_TARGET_PACK.
      - name: Build joltc (release)
        if: runner.os != 'Linux'
        run: make joltc-release JOLTC_TARGET="${{ matrix.cross }}"
        env:
          # Bake the release tag into the binary (build-joltc falls back to
          # `git describe` when this is empty, e.g. a workflow_dispatch dry run).
          JOLT_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}

      - name: Inspect the binary (Windows)
        if: runner.os == 'Windows'
        run: |
          set +e
          ls -la target/release/
          ntldd target/release/joltc.exe 2>&1 | head -20
          ./target/release/joltc.exe -e '(+ 1 2)'
          echo "exit=$?"

      # Sanity: the built binary runs (no Chez needed) and self-reports a value.
      - name: Smoke the binary
        run: |
          out="$($JOLT_RUN_PREFIX ./target/release/joltc -e '(reduce + (range 10))')"
          test "$out" = "45" || { echo "joltc -e gave '$out', want 45"; exit 1; }

      # The binary is a self-contained COMPILER: it must `build` an app with no
      # jolt source on disk. Run from an isolated dir (nothing but the tiny app)
      # so a build that reaches for host/chez/*.ss on the filesystem fails here,
      # not on a user's machine.
      - name: Smoke a self-contained build
        run: |
          joltc="$(pwd)/target/release/joltc"
          work="$(mktemp -d)"
          mkdir -p "$work/app/src/app"
          printf '{:paths ["src"]}\n' > "$work/app/deps.edn"
          printf '(ns app.core)\n(defn -main [& _] (println "built:" (reduce + (range 10))))\n' \
            > "$work/app/src/app/core.clj"
          ( cd "$work/app" && $JOLT_RUN_PREFIX "$joltc" build -m app.core -o app )
          out="$($JOLT_RUN_PREFIX "$work/app/app")"
          test "$out" = "built: 45" || { echo "self-contained build ran '$out', want 'built: 45'"; exit 1; }

      # A built binary must also run the DYNAMIC require path: a namespace not
      # in the static ns graph compiles from the source roots at runtime, so the
      # boot's top-level defines must be visible to the runtime compiler's eval
      # (issue #290: this died with "variable var-deref is not bound").
      - name: Smoke a runtime require in a built binary
        run: |
          joltc="$(pwd)/target/release/joltc"
          work="$(mktemp -d)"
          mkdir -p "$work/app/src/app"
          printf '{:paths ["src"]}\n' > "$work/app/deps.edn"
          printf '(ns app.extra)\n(defn greet [s] (str "Hello, " s "!"))\n' \
            > "$work/app/src/app/extra.clj"
          printf '(ns app.core)\n(defn -main [& _]\n  (println ((requiring-resolve (quote app.extra/greet)) "runtime")))\n' \
            > "$work/app/src/app/core.clj"
          ( cd "$work/app" && $JOLT_RUN_PREFIX "$joltc" build -m app.core -o app )
          out="$(cd "$work/app" && $JOLT_RUN_PREFIX ./app)"
          test "$out" = "Hello, runtime!" || { echo "runtime require ran '$out', want 'Hello, runtime!'"; exit 1; }

      - name: Package
        run: |
          ver="${GITHUB_REF_NAME}"
          name="joltc-${ver}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp README.md LICENSE "dist/${name}/"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/release/joltc.exe "dist/${name}/joltc.exe"
            ( cd dist && zip -r "${name}.zip" "${name}" && sha256sum "${name}.zip" > "${name}.zip.sha256" )
          else
            cp target/release/joltc "dist/${name}/joltc"
            tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            ( cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256" )
          fi
          ls -la dist

      - name: Upload to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
          fail_on_unmatched_files: false

  # Bump the Homebrew tap (jolt-lang/homebrew-jolt) to this tag: rewrite each
  # platform's url + sha256 in Formula/jolt.rb from the release's .sha256 assets.
  # Needs a HOMEBREW_TAP_TOKEN secret — a PAT with contents:write on the tap repo
  # (the default GITHUB_TOKEN can't push to another repo). Skipped if unset.
  homebrew:
    name: update homebrew tap
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Token present?
        id: tok
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "$TAP_TOKEN" ]; then echo "ok=true" >> "$GITHUB_OUTPUT";
          else echo "ok=false" >> "$GITHUB_OUTPUT"; echo "HOMEBREW_TAP_TOKEN unset — skipping tap bump"; fi

      - name: Read release checksums
        if: steps.tok.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME}"
          sha() { gh release download "$ver" --repo "${{ github.repository }}" -p "$1.sha256" -O - | awk '{print $1}'; }
          {
            echo "VER=$ver"
            echo "MAC_SHA=$(sha "joltc-${ver}-aarch64-macos.tar.gz")"
            echo "LIN_SHA=$(sha "joltc-${ver}-x86_64-linux.tar.gz")"
          } >> "$GITHUB_ENV"

      - name: Checkout tap
        if: steps.tok.outputs.ok == 'true'
        uses: actions/checkout@v4
        with:
          repository: jolt-lang/homebrew-jolt
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Bump + push formula
        if: steps.tok.outputs.ok == 'true'
        run: |
          set -euo pipefail
          base="https://github.com/${{ github.repository }}/releases/download/${VER}"
          python3 - tap/Formula/jolt.rb "$base" "$VER" "$MAC_SHA" "$LIN_SHA" <<'PY'
          import re, sys
          path, base, ver, mac, lin = sys.argv[1:6]
          s = open(path).read()
          def bump(s, target, sha):
              url = f'{base}/joltc-{ver}-{target}.tar.gz'
              s = re.sub(r'url "[^"]*' + re.escape(target) + r'\.tar\.gz"', f'url "{url}"', s)
              s = re.sub(r'(joltc-' + re.escape(ver) + '-' + re.escape(target) + r'\.tar\.gz"\s*\n\s*sha256 ")[0-9a-f]{64}',
                         r'\g<1>' + sha, s)
              return s
          s = bump(s, 'aarch64-macos', mac)
          s = bump(s, 'x86_64-linux', lin)
          open(path, 'w').write(s)
          PY
          cd tap
          git config user.name "jolt-release[bot]"
          git config user.email "jolt-release@users.noreply.github.com"
          git add Formula/jolt.rb
          git commit -m "jolt ${VER}"
          git push
